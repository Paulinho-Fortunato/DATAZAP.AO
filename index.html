    <meta name="twitter:description" content="Ganhe 20GB grátis na sua operadora favorita em Angola!">
    
    <!-- Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DATAZAP.AO",
      "url": "https://datazap.ao",
      "description": "Plataforma de promoções de dados móveis em Angola",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://datazap.ao/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <title>DATAZAP.AO | Ganhe 20GB Grátis - Unitel, Africell, Movicel</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap-icons.css">
    
    <!-- RichInfo Push -->
    <script type="module" src="https://richinfo.co/richpartners/push/js/rp-cl-ob.js?pubid=1015704&siteid=400261&niche=33" async data-cfasync="false"></script>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="script.js" as="script">
</head>
<body>

    <div class="bg-animated" id="bgAnimated"></div>

    <!-- Native Ads Container - Above the fold -->
    <div class="container-custom" style="max-width: 540px; margin: 0 auto; padding: 10px 16px 0;">
        <div id="monetag-native-top" class="native-ad-container" style="min-height: 120px; margin-bottom: 10px;"></div>
    </div>

    <div class="container-custom">
        <div class="card-main" id="mainCard" style="margin-bottom: 30px;">
            
            <!-- Header -->
            <div class="logo-header">
                <i class="bi bi-gift-fill"></i>
            </div>

            <h1 class="main-title text-center">Ganhe 20GB Grátis</h1>
            <p class="subtitle text-center">Promoção exclusiva para clientes Unitel, Africell e Movicel</p>

            <!-- Countdown -->
            <div class="countdown-box">
                <div class="countdown-label">
                    <i class="bi bi-clock-fill me-2"></i>Oferta expira em
                </div>
                <div class="countdown-timer" id="countdown">07:00</div>
            </div>

            <!-- Live Indicator -->
            <div class="text-center">
                <div class="live-indicator">
                    <span class="live-dot"></span>
                    <span><strong id="liveCount">170</strong> pessoas resgatando agora</span>
                </div>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator" id="stepIndicator">
                <div class="step-dot active" data-step="1"></div>
                <div class="step-dot" data-step="2"></div>
                <div class="step-dot" data-step="3"></div>
            </div>

            <!-- Dynamic Content Area -->
            <div id="contentArea">
                <!-- Content will be injected here -->
            </div>

            <!-- Native Ads Container - Below content -->
            <div id="monetag-native-bottom" class="native-ad-container" style="min-height: 120px; margin-top: 20px;"></div>

        </div>
 
        <p class="text-center mt-4 mb-0" style="color: var(--text-secondary); font-size: 0.875rem; align-self: center;">
            <i class="bi bi-shield-check me-2"></i>Promoção oficial DATAZAP.AO &copy; 2026
        </p>
    </div>
    
    <!-- Interstitial Ad Placeholder -->
    <div id="interstitial-ad" style="display: none;"></div>
    
    <script src="script.js"></script>
    
    <!-- Monetag Native Ads Script -->
    <script type="text/javascript">
        // Initialize Native Ads after DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            // Top Native Ad
            if (typeof monetag !== 'undefined' && monetag.native) {
                monetag.native({
                    container: '#monetag-native-top',
                    format: 'native',
                    template: 'carousel',
                    limit: 3
                });
                
                // Bottom Native Ad
                monetag.native({
                    container: '#monetag-native-bottom',
                    format: 'native',
                    template: 'list',
                    limit: 2
                });
            }
            
            // In-Page Push Notifications
            if (typeof monetag !== 'undefined' && monetag.inpagePush) {
                monetag.inpagePush({
                    position: 'bottom-right',
                    delay: 3000,
                    maxNotifications: 3
                });
            }
        });
    </script>
</body>
</html>
